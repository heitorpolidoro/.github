name: 'Setup Supabase'
description: 'Install Supabase CLI, start a local instance, and export the well-known dev env vars'

inputs:
  exclude:
    description: 'Comma-separated list of Supabase services to skip (e.g. studio,storage,realtime)'
    required: false
    default: 'analytics,edge-runtime,functions,imgproxy,inbucket,realtime,storage,studio,vector'

runs:
  using: composite
  steps:
    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: 2.102.0

    - name: Cache Supabase Docker images
      uses: actions/cache@v4
      with:
        path: /tmp/supabase-docker-cache
        key: supabase-docker-${{ runner.os }}-${{ hashFiles('supabase/config.toml') }}
        restore-keys: supabase-docker-${{ runner.os }}-

    - name: Load cached Docker images
      shell: bash
      run: |
        shopt -s nullglob
        for f in /tmp/supabase-docker-cache/*.tar; do
          echo "Loading $f..."
          docker load -i "$f"
        done

    - name: Start Supabase
      shell: bash
      run: supabase start --exclude ${{ inputs.exclude }}

    - name: Save Docker images to cache
      shell: bash
      run: |
        mkdir -p /tmp/supabase-docker-cache
        docker images --format "{{.Repository}}:{{.Tag}}" | grep -v "<none>" | while read img; do
          safe=$(echo "$img" | tr '/:' '_')
          out="/tmp/supabase-docker-cache/${safe}.tar"
          if [ ! -f "$out" ]; then
            echo "Saving $img..."
            docker save "$img" -o "$out"
          fi
        done

    - name: Export local env vars
      shell: bash
      run: |
        # These are the well-known public keys used by every Supabase local dev instance.
        # They are not secrets — see https://supabase.com/docs/guides/self-hosting/docker#generate-api-keys
        echo "NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321" >> "$GITHUB_ENV"
        echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0" >> "$GITHUB_ENV"
        echo "SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU" >> "$GITHUB_ENV"
