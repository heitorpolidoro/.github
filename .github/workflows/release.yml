name: "Release"

on:
  workflow_call:
    inputs:
      pre_bumped:
        description: |
          Set to true when the version was already bumped on the PR branch
          (e.g. by the version-bump workflow). The release job will read the
          version from package.json instead of bumping it here.
        type: boolean
        default: false
      working_directory:
        description: "Directory to run version_command in (relative to repo root)"
        type: string
        default: "."
      version_command:
        description: |
          Command to bump the version. Use $BUMP_TYPE as placeholder for major/minor/patch.
          Must print the new version (e.g. v1.2.3) to stdout.
          Ignored when pre_bumped is true.
          Examples:
            npm:    "npm version $BUMP_TYPE --no-git-tag-version"
            uv:     "uv version --bump $BUMP_TYPE && uv version --short | sed 's/^/v/'"
        type: string
        default: "npm version $BUMP_TYPE --no-git-tag-version"
      version_files:
        description: |
          Space-separated file paths (relative to repo root) to commit after version bump.
          Ignored when pre_bumped is true.
        type: string
        default: "package.json package-lock.json"
      skip_label:
        description: "Label name that means skip the release"
        type: string
        default: 'skip'

jobs:
  release:
    name: Tag and create release
    if: |
      github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.labels.*.name, inputs.skip_label)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Legacy path: bump version here at release time ──────────────────────
      - name: Determine bump type from PR label
        if: ${{ !inputs.pre_bumped }}
        id: bump
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q '"major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: ${{ !inputs.pre_bumped }}
        id: bump_version
        working-directory: ${{ inputs.working_directory }}
        env:
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
        run: |
          CMD="${{ inputs.version_command }}"
          NEW_VERSION=$(eval "${CMD/\$BUMP_TYPE/$BUMP_TYPE}")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit bumped version
        if: ${{ !inputs.pre_bumped }}
        run: |
          git add ${{ inputs.version_files }}
          git commit -m "chore: release ${{ steps.bump_version.outputs.version }} [skip ci]"

      # ── New path: version was already bumped on the PR branch ────────────────
      - name: Read version from package.json
        if: ${{ inputs.pre_bumped }}
        id: read_version
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION"

      # ── Shared: tag + push + GitHub Release ─────────────────────────────────
      - name: Create and push tag
        env:
          VERSION: ${{ inputs.pre_bumped && steps.read_version.outputs.version || steps.bump_version.outputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.pre_bumped && steps.read_version.outputs.version || steps.bump_version.outputs.version }}
          name: ${{ inputs.pre_bumped && steps.read_version.outputs.version || steps.bump_version.outputs.version }}
          generate_release_notes: true
