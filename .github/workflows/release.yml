name: "Release"

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory to run version_command in (relative to repo root)"
        type: string
        default: "."
      version_command:
        description: |
          Command to bump the version. Use $BUMP_TYPE as placeholder for major/minor/patch.
          Must print the new version (e.g. v1.2.3) to stdout.
          Examples:
            npm:    "npm version $BUMP_TYPE --no-git-tag-version"
            uv:     "uv version --bump $BUMP_TYPE && uv version --short | sed 's/^/v/'"
            mix:    custom script
        type: string
        default: "npm version $BUMP_TYPE --no-git-tag-version"
      version_files:
        description: "Space-separated file paths (relative to repo root) to commit after version bump"
        type: string
        default: "package.json package-lock.json"

jobs:
  release:
    name: Bump version and create release
    if: |
      github.event.pull_request.merged == true &&
      !contains(github.event.pull_request.labels.*.name, 'skip')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type from PR label
        id: bump
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q '"major"'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: version
        working-directory: ${{ inputs.working_directory }}
        env:
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
        run: |
          CMD="${{ inputs.version_command }}"
          NEW_VERSION=$(eval "${CMD/\$BUMP_TYPE/$BUMP_TYPE}")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit, tag and push
        run: |
          git add ${{ inputs.version_files }}
          git commit -m "chore: release ${{ steps.version.outputs.version }} [skip ci]"
          git tag ${{ steps.version.outputs.version }}
          git push origin HEAD --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
