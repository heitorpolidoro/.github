name: "Elixir Standard CI"

on:
  workflow_call:
    inputs:
      elixir-version:
        type: string
        default: "1.18.4"
      otp-version:
        type: string
        default: "28.0.4"
      postgres-db:
        type: string
        default: "repo_test"
      sonar-project-key:
        type: string
        required: true
      sonar-organization:
        type: string
        default: "heitorpolidoro"

jobs:
  test:
    name: "Build and test"
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ${{ inputs.postgres-db }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ inputs.elixir-version }}
          otp-version: ${{ inputs.otp-version }}

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Run Quality Checks
        run: mix quality_check

      - name: Run tests with coverage
        run: |
          mix coveralls.xml
          if [ -f cover/excoveralls.xml ]; then
            sed -i 's/file path="\//file path="/g' cover/excoveralls.xml
          fi

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ inputs.sonar-organization }}
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.host.url=https://sonarcloud.io
