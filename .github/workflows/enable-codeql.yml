name: "Enable CodeQL"

on:
  push:
    branches: [master]
    paths:
      - terraform/repos.tf
  workflow_dispatch:

jobs:
  enable-codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable CodeQL default setup on all repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repos=$(grep -oP '"\K[^"]+(?=" = \{)' terraform/repos.tf)
          for repo in $repos; do
            echo "Enabling CodeQL on $repo..."
            gh api -X PATCH \
              /repos/heitorpolidoro/$repo/code-scanning/default-setup \
              -f state=configured \
              -f query_suite=default \
              && echo "✅ $repo" || echo "⚠️ $repo (may not be supported)"
          done
