name: "Version Bump"

on:
  workflow_call:
    inputs:
      patch_label:
        description: "Label name that maps to a patch (semver) bump"
        type: string
        default: 'patch'
      skip_label:
        description: "Label name that skips the release entirely"
        type: string
        default: 'skip'
      version_command:
        description: |
          Command to apply the new version. Use $EXPECTED as the version placeholder.
          Examples:
            npm:  "npm version $EXPECTED --no-git-tag-version"
            uv:   "uv version $EXPECTED"
        type: string
        default: 'npm version $EXPECTED --no-git-tag-version'
      version_read_command:
        description: "Command that prints the current semver (no 'v' prefix) to stdout"
        type: string
        default: "node -p \"require('./package.json').version\""
      version_files:
        description: "Space-separated list of files to stage after the version bump"
        type: string
        default: 'package.json package-lock.json'

jobs:
  bump:
    name: Validate label and bump version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Skip immediately if the HEAD commit was made by this workflow (anti-loop)
      - name: Detect bot commit
        id: guard
        run: |
          AUTHOR=$(git log -1 --format="%an")
          echo "Last commit author: $AUTHOR"
          if echo "$AUTHOR" | grep -q "github-actions"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Validate that exactly one release label is present
      - name: Validate label
        if: steps.guard.outputs.skip == 'false'
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          PATCH_LABEL: ${{ inputs.patch_label }}
          SKIP_LABEL: ${{ inputs.skip_label }}
        run: |
          for label in major minor "$PATCH_LABEL" "$SKIP_LABEL"; do
            if echo "$LABELS" | grep -q "\"$label\""; then
              echo "✅ Found label: $label"
              echo "LABEL=$label" >> "$GITHUB_ENV"
              exit 0
            fi
          done
          echo "❌ PR must have exactly one of: major, minor, $PATCH_LABEL, $SKIP_LABEL"
          exit 1

      # skip label: nothing to bump, job succeeds
      - name: No bump needed
        if: steps.guard.outputs.skip == 'false' && env.LABEL == inputs.skip_label
        run: echo "${{ inputs.skip_label }} — no version bump needed."

      - uses: actions/setup-node@v6
        if: steps.guard.outputs.skip == 'false' && env.LABEL != inputs.skip_label
        with:
          node-version: "24.x"

      - name: Bump version on PR branch
        if: steps.guard.outputs.skip == 'false' && env.LABEL != inputs.skip_label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATCH_LABEL: ${{ inputs.patch_label }}
          VERSION_CMD: ${{ inputs.version_command }}
          VERSION_READ_CMD: ${{ inputs.version_read_command }}
          VERSION_FILES: ${{ inputs.version_files }}
        run: |
          # Map label → semver bump type
          if   [ "$LABEL" = "major" ]; then BUMP=major
          elif [ "$LABEL" = "minor" ]; then BUMP=minor
          else BUMP=patch
          fi

          # Latest release tag (fallback to v0.0.0 if no releases yet)
          LAST_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          LAST_TAG=${LAST_TAG:-v0.0.0}
          LAST_VERSION="${LAST_TAG#v}"
          echo "Last release: $LAST_TAG"

          # Calculate expected version from last release + bump type
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"
          case "$BUMP" in
            major) EXPECTED="$((MAJOR + 1)).0.0" ;;
            minor) EXPECTED="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) EXPECTED="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac
          echo "Expected version: $EXPECTED"

          # Idempotency: skip commit if already at the expected version
          CURRENT=$(eval "$VERSION_READ_CMD")
          echo "Current version: $CURRENT"
          if [ "$CURRENT" = "$EXPECTED" ]; then
            echo "Already at $EXPECTED — nothing to do."
            exit 0
          fi

          # Apply bump
          eval "${VERSION_CMD/\$EXPECTED/$EXPECTED}"

          # Commit and push to the PR branch
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # shellcheck disable=SC2086
          git add $VERSION_FILES
          git commit -m "chore: bump version to v${EXPECTED}"
          git push origin "HEAD:${{ github.head_ref }}"
