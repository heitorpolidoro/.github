name: "Configure Repos"

on:
  push:
    branches: [master]
    paths:
      - terraform/repos.tf
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure all repos
        env:
          GH_TOKEN: ${{ secrets.ORG_TERRAFORM }}
        run: |
          repos=$(grep -oP '"\K[^"]+(?=" = \{)' terraform/repos.tf)
          for repo in $repos; do
            echo "Configuring $repo..."

            gh api -X PATCH /repos/heitorpolidoro/$repo \
              -F allow_auto_merge=true \
              && echo "  ✅ auto-merge enabled" || echo "  ⚠️ auto-merge failed"

            gh api -X PATCH /repos/heitorpolidoro/$repo/code-scanning/default-setup \
              -f state=configured \
              -f query_suite=default \
              && echo "  ✅ CodeQL enabled" || echo "  ⚠️ CodeQL failed"
          done
