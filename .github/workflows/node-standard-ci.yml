name: "Node.js Standard CI"

on:
  workflow_call:
    inputs:
      node-versions:
        description: "JSON array of Node.js versions to test (e.g. ['22.x', '24.x'])"
        type: string
        default: "['24.x']"
      sonar-node-version:
        description: "Which Node version should run the SonarCloud scan?"
        type: string
        default: "24.x"
      enable-deepsource:
        description: "Whether to report coverage to DeepSource"
        type: boolean
        default: true

jobs:
  test:
    name: "Test (Node ${{ matrix.node-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ${{ fromJson(inputs.node-versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --run --coverage.enabled --coverage.reporter=lcov --reporter=dot
        env:
          CI: true

      - name: SonarCloud Scan
        if: matrix.node-version == inputs.sonar-node-version
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: DeepSource Coverage Report
        if: inputs.enable-deepsource && matrix.node-version == inputs.sonar-node-version
        run: |
          curl -fsSL https://cli.deepsource.com/install | BINDIR=./bin sh
          ./bin/deepsource report --analyzer test-coverage --key javascript --value-file ./coverage/lcov.info
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}
